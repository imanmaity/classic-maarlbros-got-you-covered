name: Weekly schedule update

on:
  schedule:
    # every 30 min, 06:00-17:00 IST, every day (GitHub cron is UTC; IST = UTC+5:30)
    - cron: "30 0 * * *"        # 06:00 IST
    - cron: "0,30 1-11 * * *"   # 06:30-17:00 IST
  workflow_dispatch:           # lets you run it manually from the Actions tab
    inputs:
      force_publish:
        description: "Publish even if the shrink-guard detects a big data drop (use only when the shrink is intentional)"
        type: boolean
        default: false

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt

      - name: Self-test (parser sanity check)
        run: python scripts/selftest.py

      - name: Fetch latest schedule from email
        env:
          MAIL_USER: ${{ secrets.MAIL_USER }}
          MAIL_PASS: ${{ secrets.MAIL_PASS }}
          SENDER: ${{ secrets.SENDER }}
          MAIL_SUBJECT: ${{ secrets.MAIL_SUBJECT }}
        run: python scripts/fetch_email.py rosters/schedule_latest.xlsx

      - name: Build dataset
        # force_publish is only ever true on a manual run with the box ticked;
        # scheduled runs always respect the shrink-guard.
        env:
          FORCE_PUBLISH: ${{ github.event_name == 'workflow_dispatch' && inputs.force_publish && '1' || '' }}
        run: python scripts/build_dataset.py --input rosters --output data
      - name: Export JSON
        run: python scripts/export_json.py data/university.db data/schedule_data.json
      - name: Build app
        run: python scripts/build_app.py data/schedule_data.json site/index.html

      - name: Refuse to publish if the import had errors
        run: |
          if grep -q "\*\*ERROR\*\*" data/validation_report.md; then
            echo "::error::Import produced ERRORs — not publishing this week."
            cat data/validation_report.md
            exit 1
          fi

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
